<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YT Focus">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <title>YT Focus</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- Setup Screen -->
    <div id="setup-screen" class="screen">
      <div class="setup-container">
        <div class="setup-logo">YT Focus</div>
        <p class="setup-subtitle">YouTube ohne Shorts</p>
        <div class="setup-instructions">
          <p>Du brauchst einen kostenlosen YouTube API Key:</p>
          <ol>
            <li>Gehe zu <a href="https://console.cloud.google.com/apis/credentials" target="_blank">Google Cloud Console</a></li>
            <li>Erstelle ein Projekt</li>
            <li>Aktiviere die "YouTube Data API v3"</li>
            <li>Erstelle einen API Key unter "Anmeldedaten"</li>
          </ol>
        </div>
        <input type="text" id="api-key-input" placeholder="API Key hier eingeben..." autocomplete="off">
        <button id="save-key-btn" class="btn-primary">Starten</button>
        <p id="setup-error" class="error-text"></p>
      </div>
    </div>

    <!-- Main App -->
    <div id="main-app" class="screen hidden">
      <!-- Header -->
      <header id="header">
        <div class="header-left">
          <span class="logo" id="logo-btn">YT Focus</span>
        </div>
        <div class="header-right">
          <button id="search-toggle" class="icon-btn" aria-label="Suchen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
          <button id="settings-btn" class="icon-btn" aria-label="Einstellungen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.611 3.611 0 0112 15.6z"/></svg>
          </button>
        </div>
      </header>

      <!-- Search Bar -->
      <div id="search-bar" class="hidden">
        <form id="search-form">
          <input type="search" id="search-input" placeholder="Suchen..." autocomplete="off">
          <button type="submit" class="icon-btn" aria-label="Suchen">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </button>
          <button type="button" id="search-close" class="icon-btn" aria-label="Schliessen">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </form>
      </div>

      <!-- Category Chips -->
      <div id="category-chips">
        <button class="chip active" data-category="trending">Trends</button>
        <button class="chip" data-category="music">Musik</button>
        <button class="chip" data-category="gaming">Gaming</button>
        <button class="chip" data-category="news">Nachrichten</button>
        <button class="chip" data-category="science">Wissenschaft</button>
        <button class="chip" data-category="sports">Sport</button>
        <button class="chip" data-category="education">Bildung</button>
      </div>

      <!-- Video Feed -->
      <main id="video-feed">
        <div id="loading" class="hidden">
          <div class="spinner"></div>
        </div>
        <div id="video-list"></div>
        <div id="load-more-container" class="hidden">
          <button id="load-more-btn" class="btn-secondary">Mehr laden</button>
        </div>
        <div id="empty-state" class="hidden">
          <p>Keine Videos gefunden.</p>
        </div>
      </main>

      <!-- Video Player Overlay -->
      <div id="player-overlay" class="hidden">
        <div id="player-header">
          <button id="player-close" class="icon-btn" aria-label="Schliessen">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
          </button>
        </div>
        <div id="player-container">
          <div id="youtube-player"></div>
        </div>
        <div id="player-info">
          <h2 id="player-title"></h2>
          <div id="player-meta">
            <span id="player-channel"></span>
            <span id="player-views"></span>
            <span id="player-date"></span>
          </div>
          <p id="player-description"></p>
        </div>
      </div>

      <!-- Settings Overlay -->
      <div id="settings-overlay" class="hidden">
        <div class="settings-panel">
          <div class="settings-header">
            <h2>Einstellungen</h2>
            <button id="settings-close" class="icon-btn" aria-label="Schliessen">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
            </button>
          </div>
          <div class="settings-body">
            <div class="setting-item">
              <label>Shorts-Filter</label>
              <div class="setting-value">
                <span class="badge-active">Aktiv</span>
              </div>
            </div>
            <div class="setting-item">
              <label>Max. Videodauer filtern (Min.)</label>
              <select id="min-duration-select">
                <option value="0">Aus</option>
                <option value="60" selected>1 Min (Shorts entfernen)</option>
                <option value="120">2 Min</option>
                <option value="300">5 Min</option>
              </select>
            </div>
            <div class="setting-item">
              <label>Region</label>
              <select id="region-select">
                <option value="DE" selected>Deutschland</option>
                <option value="AT">Österreich</option>
                <option value="CH">Schweiz</option>
                <option value="US">USA</option>
                <option value="GB">UK</option>
              </select>
            </div>
            <div class="setting-item">
              <label>API Key</label>
              <button id="change-key-btn" class="btn-secondary btn-small">Ändern</button>
            </div>
            <div class="setting-item">
              <label>Ergebnisse pro Seite</label>
              <select id="results-per-page">
                <option value="15">15</option>
                <option value="25" selected>25</option>
                <option value="50">50</option>
              </select>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
